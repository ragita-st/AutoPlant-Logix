<style>
  /* KITA INJECT CSS DARI FILE TERPISAH MENGGUNAKAN PYTHON */
</style>

<div class="dashboard-container">
    <div class="left-panel">
        <div class="card">
            <div class="card-header">🛠️ Inventaris Mesin <span class="strict-indicator">STRICT ON</span></div>
            <div class="card-body">
                <div class="facility-list" id="pool" ondrop="drop(event)" ondragover="allowDrop(event)" ondragenter="enter(event)" ondragleave="leave(event)">
                    <div class="facility fac-100" draggable="true" ondragstart="drag(event)" ondragend="dragEnd(event)" id="f0" data-val="0" data-size="100">⚙️ F1</div>
                    <div class="facility fac-100" draggable="true" ondragstart="drag(event)" ondragend="dragEnd(event)" id="f1" data-val="1" data-size="100">⚙️ F2</div>
                    <div class="facility fac-100" draggable="true" ondragstart="drag(event)" ondragend="dragEnd(event)" id="f2" data-val="2" data-size="100">⚙️ F3</div>
                    <div class="facility fac-100" draggable="true" ondragstart="drag(event)" ondragend="dragEnd(event)" id="f3" data-val="3" data-size="100">⚙️ F4</div>
                    <div class="facility fac-200" draggable="true" ondragstart="drag(event)" ondragend="dragEnd(event)" id="f4" data-val="4" data-size="200">📦 F5</div>
                    <div class="facility fac-200" draggable="true" ondragstart="drag(event)" ondragend="dragEnd(event)" id="f5" data-val="5" data-size="200">📦 F6</div>
                    <div class="facility fac-200" draggable="true" ondragstart="drag(event)" ondragend="dragEnd(event)" id="f6" data-val="6" data-size="200">📦 F7</div>
                    <div class="facility fac-200" draggable="true" ondragstart="drag(event)" ondragend="dragEnd(event)" id="f7" data-val="7" data-size="200">📦 F8</div>
                    <div class="facility fac-200" draggable="true" ondragstart="drag(event)" ondragend="dragEnd(event)" id="f8" data-val="8" data-size="200">📦 F9</div>
                    <div class="facility fac-200" draggable="true" ondragstart="drag(event)" ondragend="dragEnd(event)" id="f9" data-val="9" data-size="200">📦 F10</div>
                    <div class="facility fac-300" draggable="true" ondragstart="drag(event)" ondragend="dragEnd(event)" id="f10" data-val="10" data-size="300">🏭 F11</div>
                    <div class="facility fac-300" draggable="true" ondragstart="drag(event)" ondragend="dragEnd(event)" id="f11" data-val="11" data-size="300">🏭 F12</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">🤖 Pusat Kontrol AGV</div>
            <div class="card-body">
                <select id="part-select" onchange="previewRoute()"></select>
                <div id="route-preview" class="route-preview-container"><div class="route-placeholder">Pilih produk...</div></div>
                <button class="btn-primary" onclick="drawRouteSingle()">▶️ Jalankan AGV Terpilih</button>
                <button class="btn-secondary" onclick="drawRouteStatic()">🗺️ Tampilkan Jalur Saja</button>
                <button class="btn-multi" onclick="drawRouteMulti()">🚀 Simulasi Multi-AGV</button>
                <hr style="border:0; border-top:1px solid var(--border); margin:16px 0;">
                <div class="playback-group">
                    <button class="btn-icon" onclick="playAnim()">▶️</button>
                    <button class="btn-icon" onclick="pauseAnim()">⏸️</button>
                    <button class="btn-icon" onclick="stopAnim()">⏹️</button>
                </div>
                <select id="speed-select" onchange="changeSpeed()">
                    <option value="1">Kecepatan: 1.0x (Normal)</option>
                    <option value="0.5">Kecepatan: 0.5x (Lambat)</option>
                    <option value="5.0">Kecepatan: 5.0x (Turbo)</option>
                </select>
                <button class="btn-danger-outline" onclick="clearRoute()">Bersihkan Lintasan</button>
            </div>
        </div>
    </div>

    <div class="center-panel">
        <div class="factory-wrapper">
            <div class="factory-floor" id="floor-area">
                <svg id="route-layer"></svg>
                <div class="left-col">
                    <div class="slot" style="grid-row: span 3; grid-column: 1;" id="loc-1" data-loc="1" data-size="300" ondrop="drop(event)" ondragover="allowDrop(event)" ondragenter="enter(event)" ondragleave="leave(event)"><div class="slot-label">B</div></div>
                    <div class="slot" style="grid-row: span 3; grid-column: 2;" id="loc-11" data-loc="11" data-size="300" ondrop="drop(event)" ondragover="allowDrop(event)" ondragenter="enter(event)" ondragleave="leave(event)"><div class="slot-label">L</div></div>
                    <div class="slot" style="grid-row: 4; grid-column: 1;" id="loc-2" data-loc="2" data-size="100" ondrop="drop(event)" ondragover="allowDrop(event)" ondragenter="enter(event)" ondragleave="leave(event)"><div class="slot-label">C</div></div>
                    <div class="slot" style="grid-row: 4; grid-column: 2;" id="loc-4" data-loc="4" data-size="100" ondrop="drop(event)" ondragover="allowDrop(event)" ondragenter="enter(event)" ondragleave="leave(event)"><div class="slot-label">E</div></div>
                    <div class="slot" style="grid-row: 5; grid-column: 1;" id="loc-7" data-loc="7" data-size="100" ondrop="drop(event)" ondragover="allowDrop(event)" ondragenter="enter(event)" ondragleave="leave(event)"><div class="slot-label">H</div></div>
                    <div class="slot" style="grid-row: 5; grid-column: 2;" id="loc-10" data-loc="10" data-size="100" ondrop="drop(event)" ondragover="allowDrop(event)" ondragenter="enter(event)" ondragleave="leave(event)"><div class="slot-label">K</div></div>
                    <div class="empty-space" style="grid-row: 6; grid-column: 1;">N/A</div><div class="empty-space" style="grid-row: 6; grid-column: 2;">N/A</div>
                </div>
                <div class="aisle" id="factory-aisle"><div class="aisle-text">AISLE</div></div>
                <div class="right-col">
                    <div class="slot" style="grid-row: 1;" id="loc-0" data-loc="0" data-size="200" ondrop="drop(event)" ondragover="allowDrop(event)" ondragenter="enter(event)" ondragleave="leave(event)"><div class="slot-label">A</div></div>
                    <div class="slot" style="grid-row: 2;" id="loc-3" data-loc="3" data-size="200" ondrop="drop(event)" ondragover="allowDrop(event)" ondragenter="enter(event)" ondragleave="leave(event)"><div class="slot-label">D</div></div>
                    <div class="slot" style="grid-row: 3;" id="loc-5" data-loc="5" data-size="200" ondrop="drop(event)" ondragover="allowDrop(event)" ondragenter="enter(event)" ondragleave="leave(event)"><div class="slot-label">F</div></div>
                    <div class="slot" style="grid-row: 4;" id="loc-6" data-loc="6" data-size="200" ondrop="drop(event)" ondragover="allowDrop(event)" ondragenter="enter(event)" ondragleave="leave(event)"><div class="slot-label">G</div></div>
                    <div class="slot" style="grid-row: 5;" id="loc-8" data-loc="8" data-size="200" ondrop="drop(event)" ondragover="allowDrop(event)" ondragenter="enter(event)" ondragleave="leave(event)"><div class="slot-label">I</div></div>
                    <div class="slot" style="grid-row: 6;" id="loc-9" data-loc="9" data-size="200" ondrop="drop(event)" ondragover="allowDrop(event)" ondragenter="enter(event)" ondragleave="leave(event)"><div class="slot-label">J</div></div>
                </div>
            </div>
        </div>
    </div>

    <div class="right-panel">
        <button id="theme-toggle" class="btn-secondary" onclick="toggleTheme()" style="margin-bottom: 15px; width: 100%; display: flex; justify-content: center; gap: 8px;">
            ☀️ Ganti ke Light Mode
        </button>
        <button class="btn-success" onclick="calculate()">📊 Kalkulasi Metrik Optimalitas</button>
        <button class="btn-secondary" onclick="captureLayout()" style="background: #3b82f6; border-color: #2563eb; margin-bottom: 15px;">📸 Unduh Layout (PNG)</button>
        <div class="result-box empty" id="result-container">
            <h4>Total Material Handling Cost</h4>
            <p class="amount" id="cost-value">Rp 0</p>
            <div id="status-badge-res" style="font-size: 12px; color: var(--text-muted); margin-top: 5px;"></div>
            <div id="current-permutation" style="font-family: monospace; color: var(--primary); font-size: 13px; margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); display: none; word-break: break-all;"></div>
        </div>

        <div class="kpi-grid" id="kpi-container" style="display: none;">
            <div class="kpi-card">
                <span class="kpi-icon">📏</span>
                <div class="kpi-info">
                    <span class="kpi-label">Total Jarak</span>
                    <span class="kpi-val" id="kpi-dist">0 ft</span>
                </div>
            </div>
            <div class="kpi-card">
                <span class="kpi-icon">🔥</span>
                <div class="kpi-info">
                    <span class="kpi-label">Bottleneck</span>
                    <span class="kpi-val" id="kpi-bottle">F-</span>
                </div>
            </div>
            <div class="kpi-card">
                <span class="kpi-icon">⏱️</span>
                <div class="kpi-info">
                    <span class="kpi-label">Rute Terjauh</span>
                    <span class="kpi-val" id="kpi-longest">-</span>
                </div>
            </div>
        </div>

        <div class="card" style="margin-top: 10px;">
            <div class="card-header">📈 Analisis Rektilinear</div>
            <div class="card-body"><div class="chart-container"><canvas id="costChart"></canvas></div></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
